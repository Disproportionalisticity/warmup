
services:
  db:
    container_name: postgres-school
    image: postgres:18.0
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: school
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5332:5432"
    networks:
      - school
    restart: unless-stopped

    shm_size: 256mb
    mem_limit: 512mb
    cpus: 0.5
    pids_limit: 200

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d school"]
      interval: 10s
      timeout: 5s
      retries: 5

    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB

networks:
  school:
    name: school
    driver: bridge

volumes:
  db_data: