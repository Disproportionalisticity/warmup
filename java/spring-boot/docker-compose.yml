
services:
  db:
    container_name: postgres-spring-boot
    image: postgres:latest
    environment:
      - POSTGRES_USER=disproportionalisticity
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=spring_boot
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5332:5432"
    networks:
      - db
    restart: unless-stopped

networks:
  db:
    driver: bridge

volumes:
  db_data: